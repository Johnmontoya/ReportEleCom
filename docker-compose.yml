version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mern_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: mern_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: mern_backend
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/queue_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
    depends_on:
      - mongodb
      - redis
    ports:
      - "4000:4000"

  worker:
    build: ./backend
    container_name: mern_worker
    restart: always
    command: ["node", "dist/worker.js"]
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/queue_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
      - backend

  frontend:
    build: ./frontend
    container_name: mern_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
